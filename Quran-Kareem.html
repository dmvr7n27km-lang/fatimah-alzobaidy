<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدقة جارية - عبدالله آل عيسى ووالديه</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@400;700&display=swap');

        body {
            background-color: #000c17;
            color: white;
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding-bottom: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            background: linear-gradient(to bottom, #003366, #000c17);
            width: 100%;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 2px solid #00b4d8;
            box-sizing: border-box;
        }

        h1 { font-family: 'Amiri', serif; color: #00b4d8; margin: 10px 0; font-size: 22px; }

        .player-container {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #001b33;
            border-top: 4px solid #ffcc00;
            padding: 15px 20px;
            box-sizing: border-box;
            z-index: 9999;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.8);
            text-align: center;
        }

        #trackName {
            color: #ffcc00;
            font-size: 15px;
            margin-bottom: 10px;
            font-weight: bold;
            display: block;
        }

        audio { width: 100%; height: 45px; border-radius: 8px; }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 90%;
            max-width: 500px;
            margin-top: 20px;
            padding-bottom: 20px;
        }

        .surah-card {
            background: #002d5a;
            padding: 18px 10px;
            border-radius: 12px;
            border: 1px solid rgba(0, 180, 216, 0.4);
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
            font-size: 15px;
        }

        .surah-card:active {
            background: #ffcc00;
            color: #001b33;
        }

        .playing {
            background: #00b4d8 !important;
            color: #001b33 !important;
        }
    </style>
</head>
<body>

    <div class="header">
        <p style="margin:0; opacity:0.8; font-size: 12px;">صدقة جارية عن</p>
        <h1>عبدالله آل عيسى ووالديه رحمهم الله</h1>
        <p style="margin:0; font-size:13px; color: #aaa;">بصوت الشيخ محمد أيوب - جزء عم</p>
    </div>

    <div class="grid" id="grid"></div>

    <div class="player-container">
        <span id="trackName">اختر سورة لبدء الاستماع</span>
        <audio id="audioPlayer" controls playsinline preload="none"></audio>
        <p style="font-size: 11px; margin-top: 5px; color: #00b4d8;">إذا لم يبدأ الصوت، اضغطي على زر (▶) هنا</p>
    </div>

    <script>
        const surahs = [
            { id: "078", name: "النبأ" }, { id: "079", name: "النازعات" }, { id: "080", name: "عبس" },
            { id: "081", name: "التكوير" }, { id: "082", name: "الانفطار" }, { id: "083", name: "المطففين" },
            { id: "084", name: "الانشقاق" }, { id: "085", name: "البروج" }, { id: "086", name: "الطارق" },
            { id: "087", name: "الأعلى" }, { id: "088", name: "الغاشية" }, { id: "089", name: "الفجر" },
            { id: "090", name: "البلد" }, { id: "091", name: "الشمس" }, { id: "092", name: "الليل" },
            { id: "093", name: "الضحى" }, { id: "094", name: "الشرح" }, { id: "095", name: "التين" },
            { id: "096", name: "العلق" }, { id: "097", name: "القدر" }, { id: "098", name: "البينة" },
            { id: "099", name: "الزلزلة" }, { id: "100", name: "العاديات" }, { id: "101", name: "القارعة" },
            { id: "102", name: "التكاثر" }, { id: "103", name: "العصر" }, { id: "104", name: "الهمزة" },
            { id: "105", name: "الفيل" }, { id: "106", name: "قريش" }, { id: "107", name: "الماعون" },
            { id: "108", name: "الكوثر" }, { id: "109", name: "الكافرون" }, { id: "110", name: "النصر" },
            { id: "111", name: "المسد" }, { id: "112", name: "الإخلاص" }, { id: "113", name: "الفلق" },
            { id: "114", name: "الناس" }
        ];

        const audio = document.getElementById('audioPlayer');
        const trackName = document.getElementById('trackName');
        const grid = document.getElementById('grid');

        surahs.forEach(s => {
            const card = document.createElement('div');
            card.className = 'surah-card';
            card.innerText = "سورة " + s.name;
            
            card.onclick = function() {
                document.querySelectorAll('.surah-card').forEach(c => c.classList.remove('playing'));
                card.classList.add('playing');

                // روابط من سيرفر الأرشيف لضمان الاستمرارية
                const url = `https://archive.org/download/muhammad_ayyuub_muhammad_ayyuub_juz_30/${s.id}.mp3`;
                
                trackName.innerText = "جاري تشغيل: سورة " + s.name;
                audio.src = url;
                audio.load();
                audio.play().catch(() => {
                    trackName.innerText = "اضغطي زر التشغيل ▶ لسماع " + s.name;
                });
            };
            grid.appendChild(card);
        });
    </script>
</body>
</html>
