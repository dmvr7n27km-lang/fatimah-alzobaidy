<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدقة جارية - عبدالله آل عيسى ووالديه رحمهم الله</title>
    <style>
        :root { --dark-green: #064e3b; --emerald: #065f46; --gold: #d4af37; --bg-pattern: #053b2d; }
        body {
            background-color: var(--dark-green);
            background-image: url('https://www.transparenttextures.com/patterns/islamic-art.png'); /* زخرفة مائية */
            color: white; font-family: 'Amiri', serif; margin: 0; padding-bottom: 120px;
        }
        .header { padding: 40px 20px; text-align: center; border-bottom: 4px solid var(--gold); }
        h1 { color: var(--gold); font-size: 26px; margin: 10px 0; }
        .sheikh-img { width: 130px; height: 130px; border-radius: 50%; border: 3px solid var(--gold); margin-bottom: 15px; }
        .playlist { max-width: 600px; margin: 25px auto; padding: 0 15px; }
        .surah-item {
            display: flex; justify-content: space-between; padding: 16px; margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.05); border-radius: 10px; cursor: pointer;
            border: 1px solid rgba(212, 175, 55, 0.2); transition: 0.3s; font-size: 19px;
        }
        .surah-item:hover { background: var(--gold); color: black; transform: scale(1.02); }
        .surah-item.active { background: var(--emerald); color: white; border-color: var(--gold); }
        .charity-footer {
            position: fixed; bottom: 0; width: 100%; background: #01110e;
            padding: 10px 0; text-align: center; border-top: 2px solid var(--gold);
        }
        .charity-text { font-size: 16px; color: var(--gold); } /* بخط صغير شوي */
        audio { width: 90%; max-width: 600px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
</head>
<body>

    <div class="header">
        <img src="https://upload.wikimedia.org/wikipedia/ar/2/22/Mohamed_Ayoub.jpg" class="sheikh-img">
        <h1>القرآن الكريم | جزء عم كامل بصوت محمد أيوب</h1>
    </div>

    <div class="playlist">
        <div class="surah-item" onclick="playAudio(0, this)"><span>78. سورة النبأ</span> <small>00:00</small></div>
        <div class="surah-item" onclick="playAudio(290, this)"><span>79. سورة النازعات</span> <small>04:50</small></div>
        <div class="surah-item" onclick="playAudio(556, this)"><span>80. سورة عبس</span> <small>09:16</small></div>
        <div class="surah-item" onclick="playAudio(804, this)"><span>81. سورة التكوير</span> <small>13:24</small></div>
        <div class="surah-item" onclick="playAudio(948, this)"><span>82. سورة الانفطار</span> <small>15:48</small></div>
    </div>

    <div class="charity-footer">
        <span class="charity-text">صدقة جارية عن عبدالله آل عيسى ووالديه رحمهم الله</span>
    </div>

    <div class="player-bar">
        <audio id="audioPlayer" controls controlsList="nodownload">
            <source src="https://server16.mp3quran.net/ayoub/114.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        function playAudio(seconds, element) {
            var player = document.getElementById('audioPlayer');
            document.querySelectorAll('.surah-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
            player.currentTime = seconds;
            player.play().catch(e => { alert("نعتذر، واجهنا مشكلة في التشغيل."); });
        }
    </script>
</body>
</html>
