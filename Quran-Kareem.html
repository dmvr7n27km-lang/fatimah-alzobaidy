<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran Kareem - محمد أيوب</title>
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0b; }
        body {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1590075865003-e48277faf551?q=80&w=2000'); /* خلفية روحانية */
            background-size: cover; background-attachment: fixed;
            color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding-bottom: 100px;
        }
        .header { padding: 50px 20px; text-align: center; }
        .sheikh-img {
            width: 150px; height: 150px; border-radius: 50%;
            border: 3px solid var(--gold); box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
        }
        h1 { color: var(--gold); font-size: 28px; margin: 15px 0 5px; }
        .playlist { max-width: 500px; margin: auto; padding: 15px; }
        .surah-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            margin: 10px 0; padding: 15px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.3s; border: 1px solid rgba(212, 175, 55, 0.1);
        }
        .surah-card:hover { background: var(--gold); color: black; transform: scale(1.02); }
        .player-fixed {
            position: fixed; bottom: 0; width: 100%; background: #111;
            padding: 20px; border-top: 2px solid var(--gold); text-align: center;
        }
        audio { width: 90%; max-width: 600px; filter: sepia(20%) saturate(70%) grayscale(100%) contrast(99%) invert(100%); }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://upload.wikimedia.org/wikipedia/ar/2/22/Mohamed_Ayoub.jpg" class="sheikh-img" alt="الشيخ محمد أيوب">
        <h1>Quran Kareem</h1>
        <p style="color: #ccc;">جزء عم بصوت الشيخ محمد أيوب (رحمه الله)</p>
    </div>

    <div class="playlist">
        <div class="surah-card" onclick="play(0)"><span>1. سورة النبأ</span> <small>00:00</small></div>
        <div class="surah-card" onclick="play(289)"><span>2. سورة النازعات</span> <small>04:49</small></div>
        <div class="surah-card" onclick="play(556)"><span>3. سورة عبس</span> <small>09:16</small></div>
        <div class="surah-card" onclick="play(803)"><span>4. سورة التكوير</span> <small>13:23</small></div>
        <div class="surah-card" onclick="play(947)"><span>5. سورة الانفطار</span> <small>15:47</small></div>
        <div class="surah-card" onclick="play(1069)"><span>6. سورة المطففين</span> <small>17:49</small></div>
    </div>

    <div class="player-fixed">
        <audio id="quranAudio" controls>
            <source src="https://download.quranicaudio.com/quran/muhammad_ayyuub/complete/078.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        function play(seconds) {
            const audio = document.getElementById('quranAudio');
            audio.currentTime = seconds;
            audio.play();
        }
    </script>

</body>
</html>
