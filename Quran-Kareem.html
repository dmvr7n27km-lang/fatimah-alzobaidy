<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran Kareem - محمد أيوب</title>
    <style>
        :root { --main-color: #f5f1e6; --accent-color: #8b6b4e; --text-color: #333; }
        body {
            background-color: var(--main-color);
            background-image: url('https://p-holding.net/wp-content/uploads/2021/04/Medina-scaled.jpg'); /* رابط خلفية مائية للمدينة */
            background-blend-mode: overlay;
            background-size: cover; background-attachment: fixed;
            color: var(--text-color); font-family: 'Amiri', serif; margin: 0; padding-bottom: 120px;
        }
        .header { padding: 60px 20px; text-align: center; }
        .sheikh-photo-placeholder { display: none; } /* تم إزالة الصورة */
        h1 { color: var(--accent-color); font-size: 32px; font-weight: normal; margin-bottom: 10px; }
        .playlist { max-width: 500px; margin: auto; padding: 10px; }
        .surah-card {
            background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(10px);
            margin: 12px 0; padding: 20px; border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.4s; border: 1px solid rgba(139, 107, 78, 0.1);
        }
        .surah-card:hover { background: rgba(139, 107, 78, 0.2); transform: translateY(-3px); }
        .surah-card.active { border: 2px solid var(--accent-color); background: rgba(139, 107, 78, 0.1); }
        .player-fixed {
            position: fixed; bottom: 0; width: 100%; background: #fff;
            padding: 25px; border-top: 1px solid rgba(139, 107, 78, 0.2); text-align: center;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
        }
        audio { width: 90%; max-width: 600px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
</head>
<body>

    <div class="header">
        <h1>Quran Kareem</h1>
        <p style="color: #666;">جزء عم بصوت الشيخ محمد أيوب (رحمه الله)</p>
    </div>

    <div class="playlist">
        <div class="surah-card" onclick="play(0, this)"><span>1. سورة النبأ</span> <small>00:00</small></div>
        <div class="surah-card" onclick="play(289, this)"><span>2. سورة النازعات</span> <small>04:49</small></div>
        <div class="surah-card" onclick="play(556, this)"><span>3. سورة عبس</span> <small>09:16</small></div>
        <div class="surah-card" onclick="play(803, this)"><span>4. سورة التكوير</span> <small>13:23</small></div>
        <div class="surah-card" onclick="play(947, this)"><span>5. سورة الانفطار</span> <small>15:47</small></div>
    </div>

    <div class="player-fixed">
        <audio id="quranAudio" controls>
            <source src="https://download.quranicaudio.com/quran/muhammad_ayyuub/complete/078.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        function play(seconds, element) {
            const audio = document.getElementById('quranAudio');
            
            // إزالة حالة "نشط" من السورة السابقة
            document.querySelectorAll('.surah-card').forEach(card => card.classList.remove('active'));
            
            // إضافة حالة "نشط" للسورة الحالية
            element.classList.add('active');
            
            audio.currentTime = seconds;
            audio.play();
        }
    </script>

</body>
</html>
