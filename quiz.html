<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي المساحات والحجوم - أ. فاطمة الزبيدي</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #fff0f5; text-align: center; color: #4b0082; padding: 20px; }
        .quiz-container { background: white; max-width: 600px; margin: auto; padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 2px solid #da70d6; }
        h1 { color: #8a2be2; }
        .question-card { margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        button { background-color: #ba55d3; color: white; border: none; padding: 12px 25px; margin: 8px; border-radius: 50px; cursor: pointer; font-size: 16px; transition: 0.3s; width: 80%; }
        button:hover { background-color: #9932cc; transform: scale(1.05); }
        .footer { margin-top: 30px; font-size: 14px; color: #777; }
    </style>
</head>
<body>

    <div class="quiz-container">
        <h1>📐 تحدي المساحات والحجوم</h1>
        <p>مرحباً بكِ يا مبدعة! اختاري الإجابة الصحيحة:</p>

        <div class="question-card">
            <p>1. أسطوانة نصف قطرها 3 سم وارتفاعها 10 سم، ما حجمها؟ (استعملي π ≈ 3.14)</p>
            
            <button onclick="alert('حاولي مرة أخرى ❌')">94.2 سم³</button>
            <button onclick="alert('رائعة! إجابة صحيحة ✅')">282.6 سم³</button>
            <button onclick="alert('إجابة خاطئة ❌')">314 سم³</button>
        </div>

        <div class="question-card">
            <p>2. حجم منشور رباعي طوله 5سم، وعرضه 4سم، وارتفاعه 10سم هو:</p>
            
            <button onclick="alert('صحيح! أنتِ متميزة ✅')">200 سم³</button>
            <button onclick="alert('خطأ ❌')">100 سم³</button>
            <button onclick="alert('خطأ ❌')">20 سم³</button>
        </div>

        <div class="footer">إعداد وتنفيذ: أ. فاطمة حسن الزبيدي</div>
    </div>

</body>
</html>
